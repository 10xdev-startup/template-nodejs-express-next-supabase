# Deploy Docker → Azure (Container Registry + App Service).
# Dispara no push pra `main` e manualmente ("Run workflow").
#
# CONFIGURAR UMA VEZ POR PROJETO:
#   1. Edite o bloco `env:` abaixo com os nomes dos seus recursos Azure.
#   2. Configure os Secrets do repo (Settings → Secrets and variables → Actions):
#      - AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID  (service principal)
#      - NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY    (baked no build do front)
#   (Dica: rode a skill /deploy-azure pro setup guiado da infra na primeira vez.)

name: Deploy Docker to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: cr10xdevstarterkit # Azure Container Registry (so o nome, sem .azurecr.io)
  RESOURCE_GROUP: resource-10xdev-starter-kit
  BACKEND_APP: web-backend-10xdev-starter-kit # nome do Web App do backend
  FRONTEND_APP: web-frontend-10xdev-starter-kit # nome do Web App do frontend
  BACKEND_IMAGE: 10xdev-starter-kit-backend
  FRONTEND_IMAGE: 10xdev-starter-kit-frontend
  BACKEND_PUBLIC_URL: https://web-backend-10xdev-starter-kit.azurewebsites.net # backend de prod (build-arg do front)

jobs:
  docker-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout do codigo
      id-token: write # auth OIDC no Azure

    steps:
      - name: Preflight — checar se o workflow foi configurado
        run: |
          if printf '%s ' "${{ env.ACR_NAME }}" "${{ env.RESOURCE_GROUP }}" "${{ env.BACKEND_APP }}" "${{ env.FRONTEND_APP }}" "${{ env.BACKEND_IMAGE }}" "${{ env.FRONTEND_IMAGE }}" "${{ env.BACKEND_PUBLIC_URL }}" | grep -q 'seu-'; then
            echo "::error::Workflow nao configurado. Edite o bloco 'env:' de .github/workflows/deploy.yml com os nomes reais dos recursos (ACR, resource group, Web Apps...) e configure os Secrets. Rode a skill /deploy-azure para o passo a passo. Abortando."
            exit 1
          fi
          echo "Configuracao OK — seguindo com o deploy."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE }}:latest ./backend
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        # NEXT_PUBLIC_* sao baked no build (ARGs do frontend/Dockerfile).
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.BACKEND_PUBLIC_URL }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:latest

      - name: Deploy containers to Azure Web Apps
        run: |
          az webapp config container set \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE }}:latest
          az webapp config container set \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:latest

      - name: Restart Azure Web Apps
        run: |
          az webapp restart --name ${{ env.BACKEND_APP }} --resource-group ${{ env.RESOURCE_GROUP }}
          az webapp restart --name ${{ env.FRONTEND_APP }} --resource-group ${{ env.RESOURCE_GROUP }}
          echo "✅ Deploy concluido!"
